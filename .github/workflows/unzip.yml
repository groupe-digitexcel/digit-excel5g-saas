name: Manual Unzip Only

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Unzip archive into project directory
        run: |
          mkdir -p temp
          unzip upload/*.zip -d temp
          cp -r temp/* .
          rm -rf temp

      - name: Show extracted files (debug)
        run: ls -R
