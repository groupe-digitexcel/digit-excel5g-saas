name: Manual ZIP Extract & Commit

on:
  workflow_dispatch:  # 👈 manual trigger button

jobs:
  unzip-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: List files (debug)
        run: ls -R

      - name: Unzip archive
        run: |
          unzip upload/*.zip -d extracted

      - name: Move extracted files to root
        run: |
          cp -r extracted/* .
          rm -rf extracted

      - name: Remove zip files
        run: rm -f upload/*.zip

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Auto-extracted ZIP via workflow" || echo "No changes to commit"
          git push
