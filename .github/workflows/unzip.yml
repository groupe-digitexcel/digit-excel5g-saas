name: Unzip and Upload

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip file
        run: unzip project.zip -d ./project

      - name: Move files
        run: cp -r ./project/* .
